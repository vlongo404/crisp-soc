version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: crisp-postgres
    environment:
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc123
      POSTGRES_DB: socai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d socai"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: crisp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Para GPU NVIDIA, descomente abaixo:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  pgdata:
  ollama_models:
